<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ucapan Perkahwinan Izwan & Amira</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <h1>Izwan & Amira</h1>
            <p class="date">Sabtu, 19 Disember 2026</p>
        </header>

        <hr class="divider">

        <section class="form-section">
            <h2>Titipkan Ucapan & Doa Restu</h2>
            <form id="wishForm">
                <div class="form-group">
                    <label for="guestName">Nama Anda</label>
                    <input type="text" id="guestName" placeholder="Masukkan nama anda" required>
                </div>
                <div class="form-group">
                    <label for="guestMessage">Ucapan / Doa</label>
                    <textarea id="guestMessage" rows="4" placeholder="Tuliskan ucapan dan doa buat kedua pengantin..." required></textarea>
                </div>
                <button type="submit" id="submitBtn">Hantar Ucapan</button>
            </form>
        </section>

        <section class="wishes-section">
            <h2>Senarai Ucapan Tetamu</h2>
            <div id="wishesContainer">
                <p class="loading">Memuatkan ucapan...</p>
            </div>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="script.js"></script>

</body>
</html>
